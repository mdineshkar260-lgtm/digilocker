<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – DigiLock</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2230;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf0; --muted: #7b8099;
      --error: #f7604f; --success: #4fd47a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; padding: 1.2rem 2.5rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .logo span { color: #fff; -webkit-text-fill-color: #fff; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.8rem 2.5rem; width: 100%; max-width: 420px; animation: fadeUp 0.5s ease; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 1.9rem; font-weight: 800; margin-bottom: 0.4rem; }
    .card-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.88rem; font-weight: 500; margin-bottom: 0.45rem; color: #c5c9d8; }
    .label-row { display: flex; justify-content: space-between; align-items: center; }
    .forgot { font-size: 0.82rem; color: var(--accent); text-decoration: none; }
    input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    .btn-submit { width: 100%; padding: 0.85rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s, transform 0.2s; }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; padding: 0.75rem; background: transparent; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.7rem; transition: border-color 0.2s; }
    .btn-google:hover { border-color: var(--accent); }
    .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: rgba(247,96,79,0.12); border: 1px solid rgba(247,96,79,0.3); color: var(--error); display: flex; gap: 0.5rem; }
    .msg.success { background: rgba(79,212,122,0.12); border: 1px solid rgba(79,212,122,0.3); color: var(--success); display: flex; gap: 0.5rem; }
    .foot-text { text-align: center; color: var(--muted); font-size: 0.88rem; margin-top: 1.5rem; }
    .foot-text a { color: var(--accent); text-decoration: none; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Digi<span>Lock</span></a>
</nav>

<main>
  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to access your document vault.</p>

    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="ravi@example.com" />
    </div>

    <div class="form-group">
      <div class="label-row">
        <label>Password</label>
        <a href="#" class="forgot" onclick="forgotPassword()">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter') login()" />
    </div>

    <button class="btn-submit" id="loginBtn" onclick="login()">Sign In</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <p class="foot-text">Don't have an account? <a href="register.html">Create one</a></p>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAlKSxzJQj27ZgNfuU2olM3nUo734_5hCM",
    authDomain: "bloodlink-bd4ff.firebaseapp.com",
    projectId: "bloodlink-bd4ff",
    storageBucket: "bloodlink-bd4ff.firebasestorage.app",
    messagingSenderId: "452236946912",
    appId: "1:452236946912:web:89e42d502c0d7931794f85",
    measurementId: "G-ENPXE4JV2W"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + text;
    el.className = 'msg ' + type;
  }

  function setLoading(on) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span> Signing in...' : 'Sign In';
  }

  window.login = async function() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showMsg('Please enter email and password.', 'error');
    setLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      showMsg('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } catch (e) {
      const msgs = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password. Try again.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/too-many-requests': 'Too many attempts. Please wait.'
      };
      showMsg(msgs[e.code] || 'Login failed. Please try again.', 'error');
    } finally { setLoading(false); }
  };

  window.googleSignIn = async function() {
    try {
      await signInWithPopup(auth, provider);
      window.location.href = 'dashboard.html';
    } catch (e) {
      showMsg(e.message, 'error');
    }
  };

  window.forgotPassword = async function() {
    const email = document.getElementById('email').value.trim();
    if (!email) return showMsg('Enter your email first, then click Forgot password.', 'error');
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('Password reset email sent! Check your inbox.', 'success');
    } catch (e) {
      showMsg('Could not send reset email.', 'error');
    }
  };
</script>

</body>
</html>
