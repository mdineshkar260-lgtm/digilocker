<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Document – DigiLock</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2230;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf0; --muted: #7b8099;
      --error: #f7604f; --success: #4fd47a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .logo span { color: #fff; -webkit-text-fill-color: #fff; }
    .btn-back { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.88rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; text-decoration: none; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    main { flex: 1; display: flex; justify-content: center; padding: 3rem 1.5rem; }
    .container { width: 100%; max-width: 560px; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; margin-bottom: 0.4rem; }
    .page-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.2rem; }
    /* DROP ZONE */
    .dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .dropzone.dragover { border-color: var(--accent); background: rgba(79,142,247,0.05); }
    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone .dz-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .dropzone h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 0.4rem; }
    .dropzone p { color: var(--muted); font-size: 0.88rem; }
    .file-preview { background: rgba(79,142,247,0.08); border: 1px solid rgba(79,142,247,0.25); border-radius: 10px; padding: 1rem 1.2rem; display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
    .file-preview .file-icon { font-size: 1.8rem; }
    .file-preview .file-info { flex: 1; }
    .file-preview .file-name { font-weight: 600; font-size: 0.92rem; }
    .file-preview .file-size { color: var(--muted); font-size: 0.8rem; }
    .file-preview .remove-btn { color: var(--error); cursor: pointer; font-size: 1.2rem; }
    /* FORM */
    .form-group { margin-bottom: 1.3rem; }
    label { display: block; font-size: 0.88rem; font-weight: 500; margin-bottom: 0.45rem; color: #c5c9d8; }
    input[type=text], select, textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input[type=text]:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--surface); }
    textarea { resize: vertical; min-height: 80px; }
    /* PROGRESS */
    .progress-wrap { margin-bottom: 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.4rem; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 10px; width: 0; transition: width 0.3s; }
    /* BTN */
    .btn-upload { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-upload:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: rgba(247,96,79,0.12); border: 1px solid rgba(247,96,79,0.3); color: var(--error); display: flex; gap: 0.5rem; }
    .msg.success { background: rgba(79,212,122,0.12); border: 1px solid rgba(79,212,122,0.3); color: var(--success); display: flex; gap: 0.5rem; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">Digi<span>Lock</span></a>
  <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
</div>

<main>
  <div class="container">
    <h1 class="page-title">Upload Document</h1>
    <p class="page-sub">Securely store a document in your vault.</p>

    <div class="msg" id="msg"></div>

    <div class="card">
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onchange="onFileSelect(this)" />
        <div class="dz-icon">📎</div>
        <h3>Drop your file here</h3>
        <p>or click to browse · PDF, JPG, PNG, DOC (max 10 MB)</p>
      </div>
      <div id="filePreview" style="display:none"></div>
    </div>

    <div class="card">
      <div class="form-group">
        <label>Document Name *</label>
        <input type="text" id="docName" placeholder="e.g. Aadhaar Card 2024" />
      </div>

      <div class="form-group">
        <label>Category *</label>
        <select id="category">
          <option value="">Select category</option>
          <option value="identity">🪪 Identity (Aadhaar, PAN, Passport)</option>
          <option value="education">🎓 Education (Marksheet, Certificate)</option>
          <option value="finance">💳 Finance (Bank, Insurance)</option>
          <option value="medical">🏥 Medical (Reports, Prescriptions)</option>
          <option value="other">📄 Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="notes" placeholder="Any extra info about this document..."></textarea>
      </div>

      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-label"><span>Uploading...</span><span id="progressPct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <button class="btn-upload" id="uploadBtn" onclick="uploadDocument()">
        <span>☁️</span> Upload to Vault
      </button>
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

  // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
   apiKey: "AIzaSyAlKSxzJQj27ZgNfuU2olM3nUo734_5hCM",
    authDomain: "bloodlink-bd4ff.firebaseapp.com",
    projectId: "bloodlink-bd4ff",
    storageBucket: "bloodlink-bd4ff.firebasestorage.app",
    messagingSenderId: "452236946912",
    appId: "1:452236946912:web:89e42d502c0d7931794f85",
    measurementId: "G-ENPXE4JV2W"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null;
  let selectedFile = null;

  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
  });

  // Drag & drop
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  window.onFileSelect = function(input) {
    if (input.files[0]) handleFile(input.files[0]);
  };

  function handleFile(file) {
    if (file.size > 10 * 1024 * 1024) { showMsg('File is too large. Max 10 MB.', 'error'); return; }
    selectedFile = file;
    const ext = file.name.split('.').pop().toUpperCase();
    const icons = { PDF: '📄', JPG: '🖼️', JPEG: '🖼️', PNG: '🖼️', DOC: '📝', DOCX: '📝' };
    document.getElementById('filePreview').style.display = 'flex';
    document.getElementById('filePreview').innerHTML = `
      <div class="file-icon">${icons[ext] || '📎'}</div>
      <div class="file-info">
        <div class="file-name">${file.name}</div>
        <div class="file-size">${formatSize(file.size)} · ${ext}</div>
      </div>
      <span class="remove-btn" onclick="removeFile()">✕</span>
    `;
    if (!document.getElementById('docName').value) {
      document.getElementById('docName').value = file.name.replace(/\.[^.]+$/, '');
    }
  }

  window.removeFile = function() {
    selectedFile = null;
    document.getElementById('filePreview').style.display = 'none';
    document.getElementById('fileInput').value = '';
  };

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + text;
    el.className = 'msg ' + type;
  }

  window.uploadDocument = async function() {
    if (!selectedFile) return showMsg('Please select a file to upload.', 'error');
    const name     = document.getElementById('docName').value.trim();
    const category = document.getElementById('category').value;
    const notes    = document.getElementById('notes').value.trim();
    if (!name) return showMsg('Please enter a document name.', 'error');
    if (!category) return showMsg('Please select a category.', 'error');

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Uploading...';
    document.getElementById('progressWrap').style.display = 'block';

    try {
      const path = `documents/${currentUser.uid}/${Date.now()}_${selectedFile.name}`;
      const storageRef = ref(storage, path);
      const task = uploadBytesResumable(storageRef, selectedFile);

      task.on('state_changed',
        snap => {
          const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
          document.getElementById('progressFill').style.width = pct + '%';
          document.getElementById('progressPct').textContent = pct + '%';
        },
        err => { showMsg('Upload failed: ' + err.message, 'error'); btn.disabled = false; btn.innerHTML = '<span>☁️</span> Upload to Vault'; },
        async () => {
          const url = await getDownloadURL(task.snapshot.ref);
          await addDoc(collection(db, 'documents'), {
            uid: currentUser.uid,
            name, category, notes,
            fileUrl: url,
            filePath: path,
            fileName: selectedFile.name,
            fileSize: selectedFile.size,
            fileType: selectedFile.type,
            uploadedAt: serverTimestamp()
          });
          showMsg('Document uploaded successfully!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        }
      );
    } catch (e) {
      showMsg('Error: ' + e.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<span>☁️</span> Upload to Vault';
    }
  };
</script>

</body>
</html>
