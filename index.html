<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiLocker — Secure Document Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="auth-container">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="12" fill="url(#grad)"/>
          <path d="M12 14h16v2H12zM12 19h16v2H12zM12 24h10v2H12z" fill="#fff"/>
          <circle cx="30" cy="27" r="5" fill="#0ff" opacity="0.9"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#1a1a2e"/>
              <stop offset="100%" stop-color="#16213e"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <h1 class="brand-name">DigiLocker</h1>
        <p class="brand-tagline">Your secure document vault</p>
      </div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card" id="authCard">
      <!-- Tab Switcher -->
      <div class="tab-row">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- Error / Success Banner -->
      <div class="alert" id="alert" style="display:none"></div>

      <!-- ── Login Form ── -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="loginEmail" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
            <button type="button" class="eye-btn" onclick="togglePw('loginPassword')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none">⏳</span>
        </button>
      </form>

      <!-- ── Register Form ── -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="field">
          <label>Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="regName" placeholder="John Doe" required />
          </div>
        </div>
        <div class="field">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉</span>
            <input type="email" id="regEmail" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="field">
          <label>Password <small>(min 6 chars)</small></label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="regPassword" placeholder="••••••••" required minlength="6" />
            <button type="button" class="eye-btn" onclick="togglePw('regPassword')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" style="display:none">⏳</span>
        </button>
      </form>

      <p class="auth-footer">Protected by 256-bit encryption &nbsp;🛡️</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
