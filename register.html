<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – DigiLock</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2230;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf0; --muted: #7b8099;
      --error: #f7604f; --success: #4fd47a;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; padding: 1.2rem 2.5rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .logo span { color: #fff; -webkit-text-fill-color: #fff; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.8rem 2.5rem; width: 100%; max-width: 440px; animation: fadeUp 0.5s ease; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; }
    .card-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.88rem; font-weight: 500; margin-bottom: 0.45rem; color: #c5c9d8; }
    input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn-submit { width: 100%; padding: 0.85rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s, transform 0.2s; }
    .btn-submit:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; padding: 0.75rem; background: transparent; border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.7rem; transition: border-color 0.2s; }
    .btn-google:hover { border-color: var(--accent); }
    .msg { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: rgba(247,96,79,0.12); border: 1px solid rgba(247,96,79,0.3); color: var(--error); display: flex; align-items: center; gap: 0.5rem; }
    .msg.success { background: rgba(79,212,122,0.12); border: 1px solid rgba(79,212,122,0.3); color: var(--success); display: flex; align-items: center; gap: 0.5rem; }
    .foot-text { text-align: center; color: var(--muted); font-size: 0.88rem; margin-top: 1.5rem; }
    .foot-text a { color: var(--accent); text-decoration: none; }
    .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 0.4rem; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Digi<span>Lock</span></a>
</nav>

<main>
  <div class="card">
    <h1 class="card-title">Create Account</h1>
    <p class="card-sub">Start securing your documents today.</p>

    <div class="msg" id="msg"></div>

    <div class="form-group row2">
      <div>
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Ravi" />
      </div>
      <div>
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Kumar" />
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="ravi@example.com" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+91 9876543210" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength(this.value)" />
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" />
    </div>

    <button class="btn-submit" id="registerBtn" onclick="register()">Create Account</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <p class="foot-text">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // 🔧 REPLACE WITH YOUR FIREBASE CONFIG
 const firebaseConfig = {
  apiKey: "AIzaSyBnxJyQkSNoxyH5G7jIbDIes3-7yduaO9M",
  authDomain: "diglocker.firebaseapp.com",
  projectId: "diglocker",
  storageBucket: "diglocker.firebasestorage.app",
  messagingSenderId: "655100088476",
  appId: "1:655100088476:web:606478c6e2cf403cc0dd59",
  measurementId: "G-CT4077PKS0"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + text;
    el.className = 'msg ' + type;
  }

  function setLoading(on) {
    const btn = document.getElementById('registerBtn');
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span> Creating Account...' : 'Create Account';
  }

  async function saveUser(user, extra = {}) {
    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid,
      email: user.email,
      displayName: extra.name || user.displayName || user.email.split('@')[0],
      phone: extra.phone || '',
      photoURL: user.photoURL || '',
      createdAt: serverTimestamp(),
      lastLoginAt: serverTimestamp(),
      documentsCount: 0
    }, { merge: true }); // merge:true prevents overwriting on re-login
  }

  window.register = async function() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const phone     = document.getElementById('phone').value.trim();
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirmPassword').value;

    if (!firstName || !email || !password) return showMsg('Please fill in all required fields.', 'error');
    if (password !== confirm) return showMsg('Passwords do not match.', 'error');
    if (password.length < 8) return showMsg('Password must be at least 8 characters.', 'error');

    setLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const fullName = `${firstName} ${lastName}`.trim();
      await updateProfile(cred.user, { displayName: fullName }); // set displayName first
      await saveUser(cred.user, { name: fullName, phone });       // then save with correct name
      showMsg('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (e) {
      const msgs = {
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/weak-password': 'Password is too weak.'
      };
      showMsg(msgs[e.code] || e.message, 'error');
    } finally { setLoading(false); }
  };

  window.googleSignIn = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      await saveUser(result.user);
      window.location.href = 'dashboard.html';
    } catch (e) {
      showMsg(e.message, 'error');
    }
  };

  window.checkStrength = function(val) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#f7604f', '#f7a74f', '#f7d44f', '#4fd47a'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score - 1] || 'transparent';
  };
</script>

</body>
</html>
